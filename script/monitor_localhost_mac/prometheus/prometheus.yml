global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter 运行在 macOS 宿主机上
  # 使用 host.docker.internal 访问宿主机
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
